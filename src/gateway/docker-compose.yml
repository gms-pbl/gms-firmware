services:
  # Cloud/global MQTT broker used by backend <-> gateway traffic.
  cloud_broker:
    image: eclipse-mosquitto:2.0
    container_name: gms_cloud_broker
    command:
      - /bin/sh
      - -c
      - >
        printf 'listener ${CLOUD_BROKER_PORT:-1883}\nallow_anonymous true\npersistence true\npersistence_location /mosquitto/data/\nlog_dest file /mosquitto/log/mosquitto.log\n'
        > /tmp/mosquitto.conf
        && exec mosquitto -c /tmp/mosquitto.conf
    ports:
      - "${CLOUD_BROKER_PORT:-1883}:${CLOUD_BROKER_PORT:-1883}"
    volumes:
      - cloud_broker_data:/mosquitto/data
      - cloud_broker_log:/mosquitto/log
    restart: unless-stopped

  # Local greenhouse MQTT broker used by gateway <-> Portenta traffic.
  local_broker:
    image: eclipse-mosquitto:2.0
    container_name: gms_local_broker
    command:
      - /bin/sh
      - -c
      - >
        printf 'listener ${LOCAL_BROKER_PORT:-18831}\nallow_anonymous true\npersistence true\npersistence_location /mosquitto/data/\nlog_dest file /mosquitto/log/mosquitto.log\n'
        > /tmp/mosquitto.conf
        && exec mosquitto -c /tmp/mosquitto.conf
    ports:
      - "${LOCAL_BROKER_PORT:-18831}:${LOCAL_BROKER_PORT:-18831}"
    volumes:
      - local_broker_data:/mosquitto/data
      - local_broker_log:/mosquitto/log
    restart: unless-stopped

  # The local decision and processing engine.
  edge_engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: gms_edge_engine
    depends_on:
      - cloud_broker
      - local_broker
    volumes:
      - ./engine:/app:z
      - edge_database:/app/data
    restart: unless-stopped
    env_file:
      - ./.env

  simulator_hw:
    profiles: ["simulator"]
    build:
      context: ./simulator-hw
      dockerfile: Dockerfile
    container_name: gms_simulator_hw
    working_dir: /app
    command: sh -lc "bun install --ignore-scripts && bun run dev --host 0.0.0.0 --port 4173"
    depends_on:
      - local_broker
    ports:
      - "4173:4173"
    environment:
      - HOST=0.0.0.0
      - PORT=4173
      - MQTT_HOST=${LOCAL_BROKER_HOST:-local_broker}
      - MQTT_PORT=${LOCAL_BROKER_PORT:-18831}
      - GREENHOUSE_ID=${GREENHOUSE_ID:-test}
      - PUBLISH_INTERVAL_MS=10000
      - AUTO_CONNECT=true
      - SIM_DATA_DIR=/app/sim-data
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./simulator-hw:/app:z
      - simulator_hw_data:/app/sim-data
    restart: unless-stopped

volumes:
  edge_database:
    name: gms_edge_sqlite_db
  cloud_broker_data:
    name: gms_cloud_broker_data
  cloud_broker_log:
    name: gms_cloud_broker_log
  local_broker_data:
    name: gms_local_broker_data
  local_broker_log:
    name: gms_local_broker_log
  simulator_hw_data:
    name: gms_simulator_hw_data
